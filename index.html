

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time of Day by Kyle Russell</title>
    
    <style>
        /* We target the HTML element directly for our background color swap */
        html {
            background-color: #f4f4f9; 
            transition: background-color 0.5s ease; /* Makes the color change smooth */
        }

        body {
            font-family: sans-serif;
            text-align: center;
            margin-top: 50px;
            color: #333;
        }

        /* Our main container for the content */
        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        /* Styling our main image */
        #time-pic {
          max-width: 300px; /* Keeps our variable-sized images consistent */
          height: auto;     /* Prevents stretching/squishing */
          border-radius: 8px;
          margin-top: 20px;
          
          /* Adds a "Snazzy" Shadow: horizontal, vertical, blur, spread, and color */
          box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15); 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="main-greeting">Time of Day by Kyle Russell</h1>
        
        <h2 id="time-text">What time is it?</h2>

        <p>This page will change based on the hour of the day.</p>
        <p>Add your explanation of what the page does, and how it works here.</p>

        <img id="time-pic" src="https://dummyimage.com/300x400" alt="Time of Day Image">
    </div>

    <script>
        // We will use this section to write our if/else logic
        // Example: document.querySelector('#time-text').innerHTML = "Good Morning!";
        
        /* Below, we would target the 'html' element to change 
           the background color using document.querySelector('html') 
        */



    myDate = new Date();
    myHour = myDate.getHours();
    mySentence = "";
    myColor = "";
    myImage = "";

    if(myHour >= 4 && myHour <= 12){
        mySentence = "It's morning!";
        myColor = "#87CEEB";
        myImage = "https://images.unsplash.com/photo-1470252649358-96947c03388f?auto=format&fit=crop&q=80&w=300&h=400";
    }else if(myHour <= 18){
        mySentence = "It's after noon!";
        myColor = "#F4D03F";
        myImage = "https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&q=80&w=300&h=400";
    }else if(myHour <= 22){
        mySentence = "It's evening!";
        myColor = "#E67E22";
        myImage = "https://images.unsplash.com/photo-1472120482482-d44b0e97bc1d?auto=format&fit=crop&q=80&w=300&h=400";
    }else{
        mySentence = "It's night!";
        myColor = "#2C3E50";
        myImage = "https://images.unsplash.com/photo-1532767153582-b1a0e5145009?auto=format&fit=crop&q=80&w=300&h=400";
    }

    document.getElementById("time-text").innerHTML = mySentence;
    //document.body.style.backgroundColor = myColor;
    document.querySelector('html').style.backgroundColor = myColor;








        // Fixes HTML/CSS Checker links
        document.addEventListener("DOMContentLoaded", function() {
            var currentUrl = window.location.href;
            document.getElementById("html-validate").href = "https://validator.w3.org/nu/?doc=" + encodeURIComponent(currentUrl);
            document.getElementById("css-validate").href = "https://jigsaw.w3.org/css-validator/validator?uri=" + encodeURIComponent(currentUrl);
        });
    </script>

    <footer style="margin-top: 30px;">
        <small>
            <a id="html-validate" href="" target="_blank">Check HTML</a> | 
            <a id="css-validate" href="" target="_blank">Check CSS</a>
        </small>
    </footer>

</body>
</html>
